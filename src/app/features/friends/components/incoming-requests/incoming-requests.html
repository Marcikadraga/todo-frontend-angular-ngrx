<section class="friends-section">
    <h2>Incoming requests</h2>

    @if (requests.length === 0) {
    <p>No incoming requests.</p>
    } @else {
    <ul>
        @for (request of requests; track request.id) {
        <li>
            <span>
                Request from user id: {{ request.senderUserId }}
            </span>

            <button type="button" (click)="acceptClicked.emit(request.id)">
                Accept
            </button>

            <button type="button" (click)="declineClicked.emit(request.id)">
                Decline
            </button>
        </li>
        }
    </ul>
    }
</section>
