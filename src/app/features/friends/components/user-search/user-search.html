<section class="user-search">
  <h2>Search users</h2>

  <form (ngSubmit)="search()">
    <input
      type="text"
      name="searchText"
      [(ngModel)]="searchText"
      placeholder="Exact username or email"
    />

    <button type="submit">
      Search
    </button>
  </form>

  @if (users.length === 0) {
    <p>No search results.</p>
  } @else {
    <ul>
      @for (user of users; track user.id) {
        <li>
          <span>
            {{ user.username }} - {{ user.email }}
          </span>

          <button type="button" (click)="addFriend(user.id)">
            Add friend
          </button>
        </li>
      }
    </ul>
  }
</section>
